name: Update library version

# Triggered by the smartboiler library repo after a successful PyPI publish.
# Bumps the pinned version in requirements.txt and config.yaml, then commits
# to main. The existing builder.yaml picks up the changed files and builds
# + pushes the Docker images automatically.

on:
  repository_dispatch:
    types: [library-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'smartboiler library version (e.g. 1.3)'
        required: true

jobs:
  update-versions:
    name: Bump smartboiler version in add-on files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update smartboiler pin in requirements.txt
        run: |
          sed -i "s/^smartboiler==.*/smartboiler==${{ steps.resolve.outputs.version }}/" smartboiler/requirements.txt

      - name: Update version in config.yaml
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.resolve.outputs.version }}\"/" smartboiler/config.yaml

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add smartboiler/requirements.txt smartboiler/config.yaml
          if git diff --staged --quiet; then
            echo "No version change to commit."
            exit 0
          fi
          git commit -m "chore: bump smartboiler library to ${{ steps.resolve.outputs.version }}"
          git push
