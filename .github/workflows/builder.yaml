name: Builder

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }} smartboiler add-on
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get add-on version and base image
        id: meta
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('smartboiler/config.yaml'))['version'])")
          BUILD_FROM=$(python3 -c "import yaml; print(yaml.safe_load(open('smartboiler/build.yaml'))['build_from']['${{ matrix.arch }}'])")
          TEMPIO_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('smartboiler/build.yaml'))['args']['TEMPIO_VERSION'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT
          echo "tempio_version=$TEMPIO_VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./smartboiler
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/image-${{ matrix.arch }}-smartboiler-add-on:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/image-${{ matrix.arch }}-smartboiler-add-on:latest
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            TEMPIO_VERSION=${{ steps.meta.outputs.tempio_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
