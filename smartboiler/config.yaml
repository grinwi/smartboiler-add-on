# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Smart Boiler add-on
version: "1.3.7"
slug: smartboiler
description: Intelligent water heating management with rolling histogram prediction, spot price integration, and greedy scheduling
url: "https://github.com/grinwi/smartboiler-add-on"
arch:
  - aarch64
  - amd64
init: false
map:
  - share:rw
  - homeassistant_config:rw
hassio_api: true
image: "ghcr.io/grinwi/image-{arch}-smartboiler-add-on"
hassio_role: admin
homeassistant_api: true
ingress: true
environment:
  OPTIONS_PATH: '/data/options.json'
  DATA_PATH: '/data/'

# ── Required ──────────────────────────────────────────────────────────────
options:
  # Boiler switch (required)
  boiler_switch_entity_id: empty

  # Boiler power meter — enables HDO learning and Level 2 temp estimation
  boiler_power_entity_id: empty

  # Temperature sensors — the add-on uses the best available
  # Level 1 (best): direct NTC probe inside thermostat pocket
  boiler_direct_tmp_entity_id: empty
  # Level 3 (fallback): external case temperature sensor
  boiler_case_tmp_entity_id: empty
  # Optional: temperature sensor in the boiler room / garage.
  # If set, the thermal model uses live readings instead of the static
  # average_boiler_surroundings_temp value.  Important when the boiler is
  # in an unheated space where ambient varies seasonally.
  boiler_area_tmp_entity_id: empty

  # Water consumption sensors (optional, improve accuracy)
  boiler_water_flow_entity_id: empty
  boiler_water_temp_entity_id: empty

  # Boiler physical parameters
  boiler_volume: 120
  boiler_set_tmp: 60
  boiler_min_operation_tmp: 37
  boiler_watt_power: 2000
  average_boiler_surroundings_temp: 20

  # ── Presence tracking ─────────────────────────────────────────────────
  # Comma-separated list of person.* or device_tracker.* entity IDs
  person_entity_ids: empty

  # ── Solar PV (optional) ───────────────────────────────────────────────
  # Entity reporting surplus PV power available for heating (W, positive = surplus)
  pv_surplus_entity_id: empty

  # ── Electricity tariff ────────────────────────────────────────────────
  has_spot_price: false
  # Country code for energy-charts.info API: CZ, SK, AT, DE, PL, HU
  spot_price_region: CZ

  # ── HDO (ripple control) ──────────────────────────────────────────────
  hdo: false
  # Optional: explicit blocked hours string, e.g. "22:00-06:00,13:00-15:00"
  # Leave empty to use auto-detection from power sensor
  hdo_explicit_schedule: empty

  # ── Prediction / scheduling ───────────────────────────────────────────
  # How conservatively to predict consumption: low (p50) / medium (p75) / high (p90)
  prediction_conservatism: medium
  # Minimum days of data required before ML predictions are used
  min_training_days: 30

  # ── Thermal model (case-sensor estimation) ────────────────────────────
  # Rolling window for re-fitting the cooling model [days].
  # Shorter = adapts faster to seasonal changes; longer = more stable fit.
  thermal_model_window_days: 7
  # k_water / k_case ratio.  Water cools ~3-5× slower than the case shell
  # due to higher thermal mass.  Tune if you have a direct sensor to verify.
  thermal_mass_ratio: 0.3

  # ── System ────────────────────────────────────────────────────────────
  logging_level: INFO

schema:
  boiler_switch_entity_id: str
  boiler_power_entity_id: str
  boiler_direct_tmp_entity_id: str
  boiler_case_tmp_entity_id: str
  boiler_area_tmp_entity_id: str
  boiler_water_flow_entity_id: str
  boiler_water_temp_entity_id: str
  boiler_volume: int(1,)
  boiler_set_tmp: int(1,)
  boiler_min_operation_tmp: int(1,)
  boiler_watt_power: int(1,)
  average_boiler_surroundings_temp: int(1,)
  person_entity_ids: str
  pv_surplus_entity_id: str
  has_spot_price: bool
  spot_price_region: list(CZ|SK|AT|DE|PL|HU|FR|IT|ES)
  hdo: bool
  hdo_explicit_schedule: str
  prediction_conservatism: list(low|medium|high)
  min_training_days: int(1,)
  thermal_model_window_days: int(1,)
  thermal_mass_ratio: float(0.05,1.0)
  logging_level: list(DEBUG|INFO|WARNING|ERROR)
