# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Smart Boiler add-on
version: "1.5.9"
slug: smartboiler
description: Intelligent water heating management with rolling histogram prediction, spot price integration, and greedy scheduling
url: "https://github.com/grinwi/smartboiler-add-on"
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
image: "ghcr.io/grinwi/image-{arch}-smartboiler-add-on"
# Minimum privilege: read entity states + call switch/homeassistant services.
# "admin" is not needed and would grant full HA admin access.
hassio_role: homeassistant
homeassistant_api: true
ingress: true
environment:
  OPTIONS_PATH: '/data/options.json'
  DATA_PATH: '/data/'

# All configuration is done through the built-in web UI wizard (port 8099).
# Only the log level is kept here to bootstrap logging before the wizard runs.
options:
  logging_level: INFO

schema:
  logging_level: list(DEBUG|INFO|WARNING|ERROR)
